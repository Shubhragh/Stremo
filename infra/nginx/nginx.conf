worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    server {
        listen 8090;
        server_name localhost;

        # Map /stream/{videoId}/{path} -> MinIO bucket
        location ~ ^/stream/([^/]+)/(.*)$ {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Range,Accept,Origin,User-Agent,DNT,Cache-Control,If-Modified-Since,If-None-Match" always;
                add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;
                return 204;
            }

            resolver 127.0.0.11 ipv6=off valid=30s;
            set $video_id $1;
            set $asset_path $2;
            proxy_pass http://minio:9000/processed-videos/videos/$video_id/$asset_path;
            proxy_set_header Host minio;
            proxy_set_header Connection "";
            add_header Cache-Control "public, max-age=60";
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range,Accept,Origin,User-Agent,DNT,Cache-Control,If-Modified-Since,If-None-Match" always;
            add_header Access-Control-Expose-Headers "Content-Length,Content-Range,Accept-Ranges" always;
        }

        location /health {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin "*" always;
                add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Range,Accept,Origin,User-Agent,DNT,Cache-Control,If-Modified-Since,If-None-Match" always;
                return 204;
            }
            default_type text/plain;
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Range,Accept,Origin,User-Agent,DNT,Cache-Control,If-Modified-Since,If-None-Match" always;
            return 200 "ok";
        }
    }
}
